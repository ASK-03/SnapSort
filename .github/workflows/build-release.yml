name: Build SnapSort

on:
  release:
    types: [published] # Triggers when a release is published

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies & PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          cd backend
          pyinstaller api.py -F --noconfirm --collect-all uvicorn --collect-all fastapi --collect-all onnxruntime --collect-all rapidfuzz --name api

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd desktop
          npm install

      - name: Install bsdtar for pacman (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Download Machine Learning Models
        run: |
          mkdir -p models
          python scripts/download_models.py

      - name: Build Electron App
        run: |
          cd desktop
          npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: |
            desktop/release/**/*.exe
            desktop/release/**/*.dmg
            desktop/release/**/*.deb
            desktop/release/**/*.AppImage
            desktop/release/**/*.pacman
            desktop/release/**/*.zip
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
